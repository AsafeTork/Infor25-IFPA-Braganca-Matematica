<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Professor · Informática 25</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles/tokens.css">
<link rel="stylesheet" href="styles/base.css">
<link rel="stylesheet" href="styles/board.css">
<link rel="icon" href="assets/logo.svg" type="image/svg+xml">
<style>
.al-top{position:sticky;top:0;z-index:50;height:52px;display:flex;align-items:center;gap:.6rem;padding:0 .85rem;background:color-mix(in srgb,var(--bg) 85%,transparent);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);}
.al-brand{font-family:var(--font-display);font-weight:800;font-size:1rem;color:var(--text);letter-spacing:-.02em;flex:1;text-decoration:none;}
.al-brand b{color:var(--accent);}
.al-topright{display:flex;align-items:center;gap:.4rem;}
.al-toplink{font-size:.8rem;color:var(--text-soft);padding:.25rem .5rem;border-radius:6px;text-decoration:none;transition:all .2s;}
.al-toplink:hover{background:var(--surface-2);color:var(--text);}
</style>
</head>
<body>

<header class="al-top">
  <a class="al-brand" href="index.html">Informática <b>25</b></a>
  <div class="al-topright">
    <a href="aluno.html" class="al-toplink">Aluno</a>
    <button class="theme-toggle" id="theme-btn" aria-label="Tema"></button>
  </div>
</header>

<div class="board">
  <div class="bstage">
    <canvas id="plot-canvas" style="width:100%;height:100%;display:block;"></canvas>
    <div id="formulas-labels"></div>
  </div>
  <div class="bpanel">
    <div class="bsect">
      <span class="bsect-label">Fórmulas</span>
      <div id="formulas-rows"></div>
      <button class="btn ghost sm" id="btn-add-formula" style="width:100%;margin-top:.3rem">+ linha</button>
    </div>
    <div class="bsect brow">
      <label class="switch-label"><input type="checkbox" id="toggle-pi"> π</label>
      <button class="btn ghost sm" id="btn-reset">⌖</button>
      <label class="switch-label"><input type="checkbox" id="toggle-circle"> ⊙</label>
    </div>
    <div class="bsect" style="flex:1;overflow-y:auto">
      <span class="bsect-label">Exemplos</span>
      <div id="presets-grid"></div>
    </div>
    <div class="bsect">
      <div class="b-readout" id="readout">x = — · y = —</div>
    </div>
  </div>
</div>

<script type="module">
import { initTheme, mountThemeToggle } from "./core/theme.js";
import { compile } from "./core/mathEngine.js";
import { Plot, formatExactValue } from "./core/plotEngine.js";
import { mountFloatingKeypad } from "./components/keypad.js";

// Inicializar
initTheme();
mountThemeToggle(document.getElementById("theme-btn"));
mountFloatingKeypad();

const COLORS = ["var(--accent)", "var(--accent-2)", "#60a5fa", "#34d399"];
const PRESETS = [
  { g: "Exponencial", label: "2ˣ vs ½ˣ", fns: ["y=2^x", "y=(1/2)^x"], pi: false, uc: false },
  { g: "Exponencial", label: "Crescimento", fns: ["y=2^x", "y=3^x"], pi: false, uc: false },
  { g: "Sequências", label: "PA r=5", fns: ["y=3+(x-1)*5"], pi: false, uc: false },
  { g: "Trigonometria", label: "sin(x)", fns: ["y=sin(x)"], pi: true, uc: true },
  { g: "Trigonometria", label: "cos(x)", fns: ["y=cos(x)"], pi: true, uc: true },
  { g: "Trigonometria", label: "sin + cos", fns: ["y=sin(x)", "y=cos(x)"], pi: true, uc: true },
  { g: "Trigonometria", label: "Círculo", fns: [], pi: false, uc: true },
];

const canvas = document.getElementById("plot-canvas");
const plot = new Plot(canvas, { xmin: -6, xmax: 6, ymin: -4, ymax: 4 });

plot.onProbe = (x, y) => {
  document.getElementById("readout").textContent = `x = ${formatExactValue(x)}   y = ${formatExactValue(y)}`;
};

let formulas = [];

function addFormula(expr = "") {
  const idx = formulas.length;
  const color = COLORS[idx % COLORS.length];
  const row = document.createElement("div");
  row.className = "frow";
  row.innerHTML = `
    <span class="frow-dot" style="background:${color}"></span>
    <input class="frow-inp mono" placeholder="y=..." value="${expr}" spellcheck="false">
    <button class="frow-del">×</button>`;
  
  const inp = row.querySelector("input");
  const delBtn = row.querySelector("button");
  
  inp.addEventListener("input", updatePlot);
  delBtn.addEventListener("click", () => {
    row.remove();
    formulas = formulas.filter(f => f.input !== inp);
    updatePlot();
  });
  
  document.getElementById("formulas-rows").appendChild(row);
  formulas.push({ input: inp, color });
  updatePlot();
}

function updatePlot() {
  const curves = [];
  for (const { input, color } of formulas) {
    const expr = input.value.trim();
    if (!expr) continue;
    try {
      const compiled = compile(expr);
      if (compiled && !compiled.error) {
        curves.push({ fn: compiled.fn, color });
      }
    } catch (e) {
      console.warn("Erro ao compilar:", expr, e);
    }
  }
  plot.setCurves(curves);
  
  const labels = document.getElementById("formulas-labels");
  labels.innerHTML = formulas
    .map(({ input, color }) => input.value.trim() ? `<div class="bflabel" style="color:${color}">${input.value}</div>` : "")
    .join("");
}

document.getElementById("btn-add-formula").addEventListener("click", () => addFormula());

document.getElementById("toggle-pi").addEventListener("change", (e) => {
  plot.setPiAxis(e.target.checked);
  plot.setView(e.target.checked ? { xmin: -2*Math.PI, xmax: 2*Math.PI, ymin: -3, ymax: 3 } : { xmin: -6, xmax: 6, ymin: -4, ymax: 4 });
  plot.draw();
});

document.getElementById("toggle-circle").addEventListener("change", (e) => {
  plot.showUnitCircle = e.target.checked;
  plot.draw();
});

document.getElementById("btn-reset").addEventListener("click", () => {
  const pi = document.getElementById("toggle-pi").checked;
  plot.setView(pi ? {xmin:-2*Math.PI,xmax:2*Math.PI,ymin:-3,ymax:3} : {xmin:-6,xmax:6,ymin:-4,ymax:4});
  plot.draw();
});

const presetGrid = document.getElementById("presets-grid");
presetGrid.innerHTML = PRESETS.map((p, i) => `<button class="preset-btn" data-idx="${i}">${p.label}</button>`).join("");

presetGrid.querySelectorAll(".preset-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    const p = PRESETS[+btn.dataset.idx];
    document.getElementById("formulas-rows").innerHTML = "";
    formulas = [];
    p.fns.forEach(f => addFormula(f));
    
    document.getElementById("toggle-pi").checked = p.pi;
    plot.setPiAxis(p.pi);
    plot.setView(p.pi ? {xmin:-2*Math.PI,xmax:2*Math.PI,ymin:-3,ymax:3} : {xmin:-6,xmax:6,ymin:-4,ymax:4});
    
    document.getElementById("toggle-circle").checked = p.uc;
    plot.showUnitCircle = p.uc;
    plot.draw();
  });
});

// Iniciar
addFormula("y=2^x");
addFormula("y=(1/2)^x");

window.addEventListener("themechange", () => plot.draw());

</script>
</body>
</html>
