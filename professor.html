<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Professor · Informática 25</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles/tokens.css">
<link rel="stylesheet" href="styles/base.css">
<link rel="stylesheet" href="styles/board.css">
<link rel="icon" href="assets/logo.svg" type="image/svg+xml">
<style>
.prof-top{position:sticky;top:0;z-index:50;height:52px;display:flex;align-items:center;gap:.6rem;padding:0 1rem;background:color-mix(in srgb,var(--bg) 88%,transparent);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);}
.prof-brand{font-family:var(--font-display);font-weight:800;font-size:1rem;color:var(--text);text-decoration:none;letter-spacing:-.02em;flex:1;}
.prof-brand b{color:var(--accent);}
.prof-toplink{font-size:.8rem;color:var(--text-soft);padding:.25rem .6rem;border-radius:6px;text-decoration:none;transition:all .15s;}
.prof-toplink:hover{background:var(--surface-2);color:var(--text);}
.prof-wrap{display:grid;grid-template-columns:1fr 280px;height:calc(100dvh - 52px);overflow:hidden;}
@media(max-width:700px){.prof-wrap{grid-template-columns:1fr;grid-template-rows:55vw 1fr;}}
.prof-stage{position:relative;background:var(--bg);overflow:hidden;}
.prof-stage canvas{width:100%;height:100%;display:block;}
.prof-labels{position:absolute;top:.5rem;left:.5rem;display:flex;flex-direction:column;gap:.2rem;pointer-events:none;}
.prof-label{font-family:var(--font-mono);font-size:.75rem;background:color-mix(in srgb,var(--bg) 75%,transparent);padding:.15rem .45rem;border-radius:4px;}
.prof-panel{display:flex;flex-direction:column;border-left:1px solid var(--border);background:var(--surface);overflow:hidden;}
.prof-context{padding:.5rem 1rem;font-size:.7rem;color:var(--text-mut);letter-spacing:.04em;border-bottom:1px solid var(--border);text-align:center;}
.prof-section{padding:.75rem 1rem;border-bottom:1px solid var(--border);}
.prof-section-title{font-family:var(--font-mono);font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text-mut);margin-bottom:.5rem;}
.frow{display:flex;align-items:center;gap:.4rem;margin:.25rem 0;}
.frow-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0;cursor:pointer;border:2px solid transparent;transition:border-color .15s,transform .15s;position:relative;}
.frow-dot:hover{border-color:rgba(255,255,255,.4);transform:scale(1.25);}
.frow-color-inp{position:absolute;width:0;height:0;opacity:0;pointer-events:none;}
/* Paleta de cores */
.color-palette{position:fixed;z-index:999;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:.6rem;display:grid;grid-template-columns:repeat(5,1fr);gap:.35rem;box-shadow:0 8px 32px rgba(0,0,0,.35);}
.color-palette.hidden{display:none;}
.cp-swatch{width:24px;height:24px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:transform .15s,border-color .15s;}
.cp-swatch:hover{transform:scale(1.2);border-color:rgba(255,255,255,.5);}
.cp-swatch.active{border-color:#fff;}
.frow-inp{flex:1;background:var(--surface-2);border:1px solid var(--border);color:var(--text);padding:.3rem .5rem;border-radius:6px;font-family:var(--font-mono);font-size:.82rem;outline:none;transition:border-color .15s;}
.frow-inp:focus{border-color:var(--accent);}
.frow-del{width:22px;height:22px;border-radius:4px;border:none;background:transparent;color:var(--text-mut);cursor:pointer;font-size:.9rem;display:flex;align-items:center;justify-content:center;}
.frow-del:hover{background:color-mix(in srgb,#f00 15%,var(--surface));color:#f66;}
.prof-controls{display:flex;align-items:center;gap:.4rem;}
.ctrl-btn{height:30px;padding:0 .6rem;border-radius:6px;border:1px solid var(--border);background:var(--surface-2);color:var(--text-soft);cursor:pointer;font-size:.8rem;transition:all .15s;white-space:nowrap;}
.ctrl-btn:hover{border-color:var(--accent);color:var(--accent);}
.ctrl-btn.active{border-color:var(--accent);background:var(--accent-soft);color:var(--accent);}
.prof-presets{flex:1;overflow-y:auto;padding:.5rem;}
.preset-group{margin-bottom:.6rem;}
.preset-group-title{font-family:var(--font-mono);font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text-mut);padding:.2rem .25rem;margin-bottom:.25rem;}
.preset-btns{display:flex;flex-direction:column;gap:.2rem;}
.preset-btn{text-align:left;padding:.35rem .6rem;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text-soft);cursor:pointer;font-size:.8rem;transition:all .15s;}
.preset-btn:hover{background:var(--surface-2);color:var(--text);}
.preset-btn.active{border-color:var(--accent);background:var(--accent-soft);color:var(--accent);}
.prof-readout{font-family:var(--font-mono);font-size:.78rem;color:var(--text-soft);padding:.6rem 1rem;border-top:1px solid var(--border);}
/* Info do círculo no painel */
.uc-info{padding:.5rem 1rem;border-bottom:1px solid var(--border);display:none;}
.uc-info.show{display:block;}
.uc-row{display:flex;justify-content:space-between;gap:.5rem;padding:.1rem 0;font-family:var(--font-mono);font-size:.75rem;}
.uc-k{font-weight:700;color:var(--text-mut);}
.uc-val{color:var(--text);}
.uc-snap{font-size:.65rem;color:var(--accent);text-align:right;margin-top:.2rem;}
/* ── Ferramentas do professor ── */
.tools-grid{display:grid;grid-template-columns:1fr 1fr;gap:.3rem;margin-top:.4rem;}
.tool-btn{padding:.35rem .4rem;border-radius:6px;border:1px solid var(--border);background:var(--surface-2);color:var(--text-soft);cursor:pointer;font-size:.72rem;text-align:left;transition:all .15s;display:flex;align-items:center;gap:.35rem;}
.tool-btn:hover{border-color:var(--accent);color:var(--accent);}
.tool-btn.active{border-color:var(--accent);background:var(--accent-soft);color:var(--accent);font-weight:700;}
.tool-icon{font-size:.85rem;flex-shrink:0;}
.color-row{display:flex;gap:.3rem;margin-top:.35rem;flex-wrap:wrap;}
.color-dot{width:18px;height:18px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .15s,border-color .15s;}
.color-dot:hover{transform:scale(1.25);}
.color-dot.active{border-color:#fff;}
.sect-title{font-family:var(--font-mono);font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text-mut);margin:.5rem 0 .25rem;}
.opacity-row{display:flex;align-items:center;gap:.4rem;margin-top:.3rem;}
.opacity-row input{flex:1;accent-color:var(--accent);}
.opacity-row span{font-family:var(--font-mono);font-size:.68rem;color:var(--text-mut);min-width:28px;}
.uc-set{margin-top:.6rem;border-top:1px solid var(--border);padding-top:.5rem;}
.uc-set-title{font-family:var(--font-mono);font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text-mut);margin-bottom:.4rem;}
.uc-angle-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.2rem;}
.uc-abtn{background:var(--surface-2);border:1px solid var(--border);color:var(--text-soft);border-radius:5px;padding:.25rem .1rem;font-family:var(--font-mono);font-size:.62rem;cursor:pointer;text-align:center;transition:all .15s;white-space:nowrap;}
.uc-abtn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft);}
.uc-abtn.active{border-color:var(--accent);background:var(--accent-soft);color:var(--accent);font-weight:700;}
.uc-custom{display:flex;gap:.3rem;margin-top:.4rem;}
.uc-custom input{flex:1;background:var(--surface-2);border:1px solid var(--border);color:var(--text);padding:.3rem .4rem;border-radius:5px;font-family:var(--font-mono);font-size:.75rem;outline:none;}
.uc-custom input:focus{border-color:var(--accent);}
.uc-custom button{background:var(--accent);border:none;color:#000;padding:.3rem .5rem;border-radius:5px;font-weight:700;font-size:.72rem;cursor:pointer;}
.uc-tab{flex:1;background:var(--surface-2);border:1px solid var(--border);color:var(--text-mut);border-radius:5px;padding:.22rem .3rem;font-size:.6rem;font-family:var(--font-mono);cursor:pointer;transition:all .15s;}
.uc-tab.active{border-color:var(--accent);background:var(--accent-soft);color:var(--accent);font-weight:700;}
#uc-negate-btn{background:var(--surface-2) !important;border:1px solid var(--border) !important;color:var(--text) !important;flex-shrink:0;}
#uc-negate-btn:hover{border-color:var(--accent) !important;color:var(--accent) !important;}
</style>
</head>
<body>

<header class="prof-top">
  <a class="prof-brand" href="index.html">Informática <b>25</b></a>
  <a href="aluno.html" class="prof-toplink">Aluno</a>
  <button class="theme-toggle" id="theme-btn" aria-label="Tema"></button>
</header>

<div class="prof-wrap">
  <div class="prof-stage" id="prof-stage">
    <canvas id="plot-canvas"></canvas>
    <div class="prof-labels" id="prof-labels"></div>
  </div>
  <div class="prof-panel">
    <div class="prof-context">Gráficos interativos · Informática 25</div>
    <div class="prof-section">
      <div class="prof-section-title">Fórmulas</div>
      <div id="formulas-rows"></div>
      <button class="ctrl-btn" id="btn-add" style="width:100%;margin-top:.4rem;text-align:center">+ linha</button>
    </div>
    <div class="prof-section">
      <div class="prof-controls">
        <button class="ctrl-btn" id="btn-pi">π eixo</button>
        <button class="ctrl-btn" id="btn-circle">⊙ círculo</button>
        <button class="ctrl-btn" id="btn-reset">⌖</button>
      </div>
    </div>
    <!-- Info do círculo unitário -->
    <div class="uc-info" id="uc-info">
      <div class="uc-row"><span class="uc-k">cos θ</span><span class="uc-val" id="uc-cos">—</span></div>
      <div class="uc-row"><span class="uc-k">sin θ</span><span class="uc-val" id="uc-sin">—</span></div>
      <div class="uc-row"><span class="uc-k">tan θ</span><span class="uc-val" id="uc-tan">—</span></div>
      <div class="uc-row"><span class="uc-k">θ</span><span class="uc-val" id="uc-ang">—</span></div>
      <div class="uc-snap" id="uc-snap"></div>
      <!-- Seletor de ângulos -->
      <div class="uc-set">
        <div class="uc-set-title">Definir ângulo</div>
        <div style="display:flex;gap:.3rem;margin-bottom:.3rem;">
          <button class="uc-tab active" id="tab-pos" onclick="ucShowTab('pos')">+ positivos</button>
          <button class="uc-tab" id="tab-neg" onclick="ucShowTab('neg')">− negativos</button>
        </div>
        <div class="uc-angle-grid" id="uc-angle-grid"></div>
        <div class="uc-custom">
          <input id="uc-custom-inp" name="uc-angle" autocomplete="off" placeholder="ex: -π/3 ou -90°">
          <button id="uc-negate-btn" title="Negar ângulo atual">±</button>
          <button id="uc-custom-btn">→</button>
        </div>
      </div>
    </div>
    <!-- ── Ferramentas Pedagógicas ── -->
    <div class="prof-section" id="tools-section">
      <div class="prof-section-title">Ferramentas</div>

      <div class="sect-title">Destaques no gráfico</div>
      <div class="tools-grid">
        <button class="tool-btn" id="tool-marker" title="Marcar ponto específico">
          <span class="tool-icon">📍</span> Marcar ponto
        </button>
        <button class="tool-btn" id="tool-vline" title="Linha vertical de destaque">
          <span class="tool-icon">|</span> Linha vertical
        </button>
        <button class="tool-btn" id="tool-area" title="Sombrear área sob a curva">
          <span class="tool-icon">▓</span> Sombrear área
        </button>
        <button class="tool-btn" id="tool-triangle" title="Triângulo retângulo colorido">
          <span class="tool-icon">△</span> Triângulo
        </button>
      </div>

      <div class="sect-title">Cor do destaque</div>
      <div class="color-row" id="tool-colors">
        <div class="color-dot active" data-c="#ffa500" style="background:#ffa500" title="Laranja"></div>
        <div class="color-dot" data-c="#ffd23f" style="background:#ffd23f" title="Amarelo"></div>
        <div class="color-dot" data-c="#60a5fa" style="background:#60a5fa" title="Azul"></div>
        <div class="color-dot" data-c="#34d399" style="background:#34d399" title="Verde"></div>
        <div class="color-dot" data-c="#f472b6" style="background:#f472b6" title="Rosa"></div>
        <div class="color-dot" data-c="#f87171" style="background:#f87171" title="Vermelho"></div>
        <div class="color-dot" data-c="#e2e8f0" style="background:#e2e8f0" title="Branco"></div>
      </div>

      <div class="sect-title">Opacidade da área</div>
      <div class="opacity-row">
        <input type="range" id="area-opacity" min="5" max="60" value="25">
        <span id="area-opacity-val">25%</span>
      </div>

      <button class="tool-btn" id="tool-clear" style="margin-top:.4rem;width:100%;justify-content:center">
        <span class="tool-icon">🗑</span> Limpar destaques
      </button>
    </div>

    <div class="prof-presets" id="prof-presets"></div>
    <div class="prof-readout" id="readout">x = —   y = —</div>
  </div>
</div>

<script type="module">
import { initTheme, mountThemeToggle } from "./core/theme.js";
import { compile } from "./core/mathEngine.js";
import { Plot, formatExactValue } from "./core/plotEngine.js";
import { mountFloatingKeypad } from "./components/keypad.js";

initTheme();
mountThemeToggle(document.getElementById("theme-btn"));
mountFloatingKeypad();

const COLORS = ["#ffa500","#ffd23f","#60a5fa","#34d399","#a78bfa","#fb923c"];

const PRESET_GROUPS = [
  { title:"Exponencial", items:[
    { label:"2ˣ vs ½ˣ",   fns:["y=2^x","y=(1/2)^x"],           pi:false, uc:false },
    { label:"Bases > 1",   fns:["y=2^x","y=3^x","y=10^x"],       pi:false, uc:false },
    { label:"Juros 3%",    fns:["y=1800*(1.03)^x"],               pi:false, uc:false, view:{xmin:0,xmax:30,ymin:0,ymax:5000} },
    { label:"Decaimento",  fns:["y=100*(0.5)^x"],                 pi:false, uc:false, view:{xmin:0,xmax:10,ymin:0,ymax:110} },
  ]},
  { title:"Sequências", items:[
    { label:"PA  r=5",     fns:["y=3+(x-1)*5"],                   pi:false, uc:false, view:{xmin:0,xmax:10,ymin:-5,ymax:50} },
    { label:"PG  q=2",     fns:["y=2*2^(x-1)"],                   pi:false, uc:false, view:{xmin:0,xmax:8,ymin:-2,ymax:60} },
    { label:"PA vs PG",    fns:["y=5+(x-1)*5","y=5*1.5^(x-1)"],   pi:false, uc:false, view:{xmin:0,xmax:14,ymin:-5,ymax:100} },
  ]},
  { title:"Trigonometria", items:[
    { label:"sin(x)",      fns:["y=sin(x)"],                      pi:true,  uc:true  },
    { label:"cos(x)",      fns:["y=cos(x)"],                      pi:true,  uc:true  },
    { label:"tan(x)",      fns:["y=tan(x)"],                      pi:true,  uc:true,  view:{xmin:-Math.PI,xmax:Math.PI,ymin:-4,ymax:4} },
    { label:"sin + cos",   fns:["y=sin(x)","y=cos(x)"],           pi:true,  uc:true  },
    { label:"Círculo unit.",fns:[],                                pi:false, uc:true  },
  ]},
  { title:"Álgebra", items:[
    { label:"Parábola",    fns:["y=x^2","y=x^2-4"],               pi:false, uc:false },
    { label:"Raízes",      fns:["y=sqrt(x)","y=x^(1/3)"],         pi:false, uc:false, view:{xmin:-3,xmax:8,ymin:-3,ymax:4} },
  ]},
];

/* ──────────── PLOT ──────────── */
const canvas = document.getElementById("plot-canvas");
const plot   = new Plot(canvas, { xmin:-6, xmax:6, ymin:-4, ymax:4 });

plot.onProbe = (x, y) => {
  document.getElementById("readout").textContent =
    `x = ${formatExactValue(x)}   y = ${formatExactValue(y)}`;
};

/* ──────────── CÍRCULO UNITÁRIO — desenhado direto no canvas do plot ──────────── */
const NOTABLE = [
  {a:0,           l:"0",     s:"0",    c:"1",    t:"0"   },
  {a:Math.PI/6,   l:"π/6",   s:"1/2",  c:"√3/2", t:"√3/3"},
  {a:Math.PI/4,   l:"π/4",   s:"√2/2", c:"√2/2", t:"1"   },
  {a:Math.PI/3,   l:"π/3",   s:"√3/2", c:"1/2",  t:"√3"  },
  {a:Math.PI/2,   l:"π/2",   s:"1",    c:"0",    t:"∄"   },
  {a:2*Math.PI/3, l:"2π/3",  s:"√3/2", c:"-1/2", t:"-√3" },
  {a:3*Math.PI/4, l:"3π/4",  s:"√2/2", c:"-√2/2",t:"-1"  },
  {a:5*Math.PI/6, l:"5π/6",  s:"1/2",  c:"-√3/2",t:"-√3/3"},
  {a:Math.PI,     l:"π",     s:"0",    c:"-1",   t:"0"   },
  {a:7*Math.PI/6, l:"7π/6",  s:"-1/2", c:"-√3/2",t:"√3/3"},
  {a:5*Math.PI/4, l:"5π/4",  s:"-√2/2",c:"-√2/2",t:"1"  },
  {a:4*Math.PI/3, l:"4π/3",  s:"-√3/2",c:"-1/2", t:"√3" },
  {a:3*Math.PI/2, l:"3π/2",  s:"-1",   c:"0",    t:"∄"  },
  {a:5*Math.PI/3, l:"5π/3",  s:"-√3/2",c:"1/2",  t:"-√3"},
  {a:7*Math.PI/4, l:"7π/4",  s:"-√2/2",c:"√2/2", t:"-1" },
  {a:11*Math.PI/6,l:"11π/6", s:"-1/2", c:"√3/2", t:"-√3/3"},
];

// Ângulos notáveis negativos (mesmo ponto, label negativo)
const NOTABLE_NEG = [
  {a:-Math.PI/6,   l:"-π/6",   s:"-1/2",  c:"√3/2",  t:"-√3/3"},
  {a:-Math.PI/4,   l:"-π/4",   s:"-√2/2", c:"√2/2",  t:"-1"   },
  {a:-Math.PI/3,   l:"-π/3",   s:"-√3/2", c:"1/2",   t:"-√3"  },
  {a:-Math.PI/2,   l:"-π/2",   s:"-1",    c:"0",     t:"∄"    },
  {a:-2*Math.PI/3, l:"-2π/3",  s:"-√3/2", c:"-1/2",  t:"√3"   },
  {a:-3*Math.PI/4, l:"-3π/4",  s:"-√2/2", c:"-√2/2", t:"1"    },
  {a:-5*Math.PI/6, l:"-5π/6",  s:"-1/2",  c:"-√3/2", t:"√3/3" },
  {a:-Math.PI,     l:"-π",     s:"0",     c:"-1",    t:"0"    },
  {a:-7*Math.PI/6, l:"-7π/6",  s:"1/2",   c:"-√3/2", t:"-√3/3"},
  {a:-5*Math.PI/4, l:"-5π/4",  s:"√2/2",  c:"-√2/2", t:"-1"   },
  {a:-4*Math.PI/3, l:"-4π/3",  s:"√3/2",  c:"-1/2",  t:"-√3"  },
  {a:-3*Math.PI/2, l:"-3π/2",  s:"1",     c:"0",     t:"∄"    },
  {a:-5*Math.PI/3, l:"-5π/3",  s:"√3/2",  c:"1/2",   t:"√3"   },
  {a:-7*Math.PI/4, l:"-7π/4",  s:"√2/2",  c:"√2/2",  t:"1"    },
  {a:-11*Math.PI/6,l:"-11π/6", s:"1/2",   c:"√3/2",  t:"√3/3" },
];

let ucActive  = false;
let ucTheta   = Math.PI / 3;
let ucSnapped = null;
let ucDragging = false;

function ucSnap(t, thresh = 0.1) {
  // Volta atual (sem contar voltas completas)
  const base = t < 0
    ? -((-t) % (2*Math.PI))              // negativo: volta negativa
    : t % (2*Math.PI);                   // positivo: volta positiva
  const list = t < 0 ? NOTABLE_NEG : NOTABLE;
  for (const k of list) {
    if (Math.abs(base - k.a) < thresh) return k;
  }
  return null;
}

function ucGetCXYR() {
  return { cx: plot.X(0), cy: plot.Y(0), r: plot.X(1) - plot.X(0) };
}

function ucAutoZoom() {
  const W = canvas.clientWidth, H = canvas.clientHeight;
  const yRange = 3.2;
  const xRange = yRange * (W / H);
  plot.setView({ xmin:-xRange/2, xmax:xRange/2, ymin:-yRange/2, ymax:yRange/2 });
}

/* Desenha o círculo no ctx do plot — chamado dentro de plot.onDraw */
function ucDraw() {
  if (!ucActive) return;
  const ctx  = plot.ctx;
  const dpr  = window.devicePixelRatio || 1;
  const { cx, cy, r } = ucGetCXYR();
  if (r < 10) return;

  const css  = v => getComputedStyle(document.documentElement).getPropertyValue(v).trim();
  const dark = document.documentElement.getAttribute("data-theme") !== "light";
  const fg   = dark ? "#e8e3da" : "#1a1a2e";
  const fgMut= dark ? "rgba(220,210,190,.35)" : "rgba(60,60,80,.28)";
  const acc  = css("--accent")   || "#ffa500";
  const acc2 = css("--accent-2") || "#ffd23f";
  const grn  = dark ? "#4ade80"  : "#16a34a";

  const t  = ucTheta;
  const tN = ((t % (2*Math.PI)) + 2*Math.PI) % (2*Math.PI);
  const co = Math.cos(t), si = Math.sin(t);
  const px = cx + r*co, py = cy - r*si;

  ctx.save();

  /* Círculo */
  ctx.strokeStyle = fgMut; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, 2*Math.PI); ctx.stroke();

  /* Pontos notáveis */
  ctx.fillStyle = fgMut;
  for (const n of NOTABLE) {
    ctx.beginPath();
    ctx.arc(cx + r*Math.cos(n.a), cy - r*Math.sin(n.a), 2, 0, 2*Math.PI);
    ctx.fill();
  }

  /* ── Arco: cor muda por volta (k), voltas completas visíveis ── */
  const TURN_COLORS = [acc, acc2, "#60a5fa", "#34d399", "#a78bfa", "#fb923c", "#f472b6"];
  const isNeg   = ucTheta < 0;
  const absT    = Math.abs(ucTheta);
  const k       = Math.floor(absT / (2 * Math.PI));
  const partial = absT % (2 * Math.PI);
  // Canvas: Y invertido → ângulo positivo (mat) = anti-horário na tela = arcCCW=true
  //         ângulo negativo (mat) = horário na tela = arcCCW=false
  const arcEnd = isNeg ? partial : -partial;
  const arcCCW = !isNeg;

  // 1. Trilha fantasma — círculo guia muito suave
  ctx.strokeStyle = fgMut + "55"; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, 2 * Math.PI); ctx.stroke();

  // 2. Voltas COMPLETAS anteriores — circulo cheio, cada uma na sua cor
  //    A mais antiga fica mais apagada
  for (let i = 0; i < k; i++) {
    const col  = TURN_COLORS[i % TURN_COLORS.length];
    const age  = k - 1 - i;                           // 0 = mais recente
    const opac = Math.max(30, 90 - age * 22);         // opacidade 30..90
    const hex  = opac.toString(16).padStart(2, "0");
    ctx.strokeStyle = col + hex; ctx.lineWidth = 3.5;
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, 2 * Math.PI); ctx.stroke();
  }

  // 3. Arco parcial da volta atual — mais brilhante, por cima
  const kColor = TURN_COLORS[k % TURN_COLORS.length];
  ctx.strokeStyle = kColor + "dd"; ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, arcEnd, arcCCW);
  ctx.stroke();

  // 4. Mini arco indicador de ângulo no centro
  ctx.strokeStyle = kColor + "99"; ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(cx, cy, r * .2, 0, arcEnd, arcCCW);
  ctx.stroke();

  /* Tangente */
  if (Math.abs(co) > 0.07) {
    const tn = si/co, tx = cx+r, ty = cy - r*tn;
    const H  = plot.H;
    ctx.strokeStyle = grn+"25"; ctx.lineWidth = 1; ctx.setLineDash([3,4]);
    ctx.beginPath(); ctx.moveTo(tx, 0); ctx.lineTo(tx, H); ctx.stroke();
    ctx.setLineDash([]);
    ctx.strokeStyle = grn+"bb"; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(tx, cy); ctx.lineTo(tx, ty); ctx.stroke();
    ctx.strokeStyle = grn+"44"; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(tx, ty); ctx.stroke();
    ctx.fillStyle = grn;
    ctx.beginPath(); ctx.arc(tx, ty, 3.5, 0, 2*Math.PI); ctx.fill();
  }
  ctx.setLineDash([]);

  /* Projeções */
  ctx.strokeStyle = acc;  ctx.lineWidth = 1.8; ctx.setLineDash([4,3]);
  ctx.beginPath(); ctx.moveTo(cx, py); ctx.lineTo(px, py); ctx.stroke();
  ctx.strokeStyle = acc2; ctx.lineWidth = 1.8;
  ctx.beginPath(); ctx.moveTo(px, cy); ctx.lineTo(px, py); ctx.stroke();
  ctx.setLineDash([]);

  /* Pontos nos eixos */
  ctx.fillStyle = acc;  ctx.beginPath(); ctx.arc(px, cy, 4, 0, 2*Math.PI); ctx.fill();
  ctx.fillStyle = acc2; ctx.beginPath(); ctx.arc(cx, py, 4, 0, 2*Math.PI); ctx.fill();

  /* Triângulo retângulo */
  ctx.strokeStyle = fgMut; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(px,cy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(px,cy); ctx.lineTo(px,py); ctx.stroke();

  /* Raio */
  ctx.strokeStyle = fg; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(px,py); ctx.stroke();

  /* Ponto principal */
  ctx.fillStyle = ucSnapped ? acc2 : acc;
  ctx.beginPath(); ctx.arc(px, py, 9, 0, 2*Math.PI); ctx.fill();
  ctx.strokeStyle = dark ? "rgba(8,8,20,.8)" : "rgba(255,255,255,.8)";
  ctx.lineWidth = 2; ctx.stroke();

  /* Labels */
  const fs = ~~(r*.1);
  ctx.font = `bold ${fs}px monospace`;
  ctx.fillStyle = acc; ctx.textAlign = "center";
  ctx.fillText("cos θ", (cx+px)/2, cy + (si>=0?13:-10));
  ctx.fillStyle = acc2; ctx.textAlign = co>=0?"left":"right"; ctx.textBaseline="middle";
  ctx.fillText("sin θ", px+(co>=0?6:-6), (cy+py)/2);

  /* Ângulo */
  const la=tN/2, lr=r*.28;
  ctx.fillStyle = fg; ctx.font=`bold ${~~(r*.11)}px monospace`;
  ctx.textAlign="left"; ctx.textBaseline="middle";
  const signedDeg = (ucTheta < 0 ? -1 : 1) * partial * 180 / Math.PI;
  let lbl = ucSnapped ? ucSnapped.l : `${signedDeg.toFixed(1)}°`;
  if (k > 0) lbl += `  (k=${k})`;
  ctx.fillText(lbl, cx+lr*Math.cos(la)+4, cy-lr*Math.sin(la));

  ctx.restore();
}

plot.onDraw = () => { ucDraw(); drawOverlays(); };

/* Interação com o círculo — capture phase para ter prioridade sobre o plot */
let ucPrev = null;
let ucPointerId = null;

function ucCanvasCoords(e) {
  const rect = canvas.getBoundingClientRect();
  return {
    mx: (e.clientX - rect.left) / rect.width  * plot.W,
    my: (e.clientY - rect.top)  / rect.height * plot.H,
  };
}

// CAPTURE PHASE — dispara antes dos handlers do plot (bubble)
canvas.addEventListener("pointerdown", e => {
  if (!ucActive || ucPointerId !== null) return;
  const { cx, cy, r } = ucGetCXYR();
  const { mx, my } = ucCanvasCoords(e);
  const px = cx + r * Math.cos(ucTheta);
  const py = cy - r * Math.sin(ucTheta);
  const hit = Math.max(52, r * 0.18);
  if (Math.hypot(mx - px, my - py) > hit) return; // fora → deixa plot fazer pan
  e.preventDefault();
  e.stopPropagation(); // bloqueia plot
  canvas.setPointerCapture(e.pointerId);
  ucPointerId = e.pointerId;
  ucDragging  = true;
  ucPrev = Math.atan2(-(my - cy), mx - cx);
}, { capture: true });

let ucRaf = null;
canvas.addEventListener("pointermove", e => {
  if (!ucDragging || e.pointerId !== ucPointerId) return;
  e.preventDefault();
  e.stopPropagation();
  const { cx, cy } = ucGetCXYR();
  const { mx, my } = ucCanvasCoords(e);
  const cur = Math.atan2(-(my - cy), mx - cx);
  let delta = cur - ucPrev;
  if (delta >  Math.PI) delta -= 2*Math.PI;
  if (delta < -Math.PI) delta += 2*Math.PI;
  ucTheta += delta;
  ucPrev = cur;
  ucSnapped = ucSnap(ucTheta, 0.1);
  ucUpdateInfo();
  // Desenha no próximo frame — não bloqueia os eventos de pointer
  if (!ucRaf) ucRaf = requestAnimationFrame(() => { ucRaf = null; plot.draw(); });
}, { capture: true });

const ucRelease = e => {
  if (e.pointerId !== ucPointerId) return;
  // Snap final mais forte ao soltar
  const sn = ucSnap(ucTheta, 0.12);
  if (sn) {
    const turns = Math.round(ucTheta / (2*Math.PI));
    ucTheta = turns * 2*Math.PI + sn.a;
    ucSnapped = sn;
    ucUpdateInfo();
    plot.draw();
  }
  ucDragging  = false;
  ucPointerId = null;
  canvas.releasePointerCapture(e.pointerId);
};
canvas.addEventListener("pointerup",     ucRelease, { capture: true });
canvas.addEventListener("pointercancel", ucRelease, { capture: true });

function ucUpdateInfo() {
  const co = Math.cos(ucTheta), si = Math.sin(ucTheta), tn = si/co;
  const k  = Math.floor(Math.abs(ucTheta) / (2*Math.PI));
  const n  = ucSnapped;
  // Ângulo da volta atual com sinal correto
  const sign   = ucTheta < 0 ? -1 : 1;
  const partial = Math.abs(ucTheta) % (2*Math.PI);
  const degVal  = sign * partial * 180 / Math.PI;
  document.getElementById("uc-cos").textContent = n ? `${n.c}  (${co.toFixed(3)})` : co.toFixed(4);
  document.getElementById("uc-sin").textContent = n ? `${n.s}  (${si.toFixed(3)})` : si.toFixed(4);
  document.getElementById("uc-tan").textContent = n ? n.t : (Math.abs(co)<.01?"∄":tn.toFixed(4));
  const angBase = n ? n.l : `${degVal.toFixed(1)}°`;
  document.getElementById("uc-ang").textContent = k > 0 ? `${angBase} + 2·${k}π` : angBase;
  document.getElementById("uc-snap").textContent = k > 0
    ? (n ? `⊙ notável · k = ${k}` : `k = ${k}`)
    : (n ? "⊙ ângulo notável" : "");
  // Destacar botão ativo (compara com módulo para aguentar multi-volta)
  const tCur = ((ucTheta % (2*Math.PI)) + 2*Math.PI) % (2*Math.PI);
  const tCurSigned = ucTheta < 0 ? tCur - 2*Math.PI : tCur;
  document.querySelectorAll(".uc-abtn").forEach(b => {
    const ba = +b.dataset.a;
    b.classList.toggle("active", Math.abs(tCurSigned - ba) < 0.02 || Math.abs(tCur - ba) < 0.02);
  });
}

/* ── Ângulos notáveis — grade de botões ── */
const UC_ANGLES = [
  { l:"0",     a:0            },
  { l:"π/6",   a:Math.PI/6   },
  { l:"π/4",   a:Math.PI/4   },
  { l:"π/3",   a:Math.PI/3   },
  { l:"π/2",   a:Math.PI/2   },
  { l:"2π/3",  a:2*Math.PI/3 },
  { l:"3π/4",  a:3*Math.PI/4 },
  { l:"5π/6",  a:5*Math.PI/6 },
  { l:"π",     a:Math.PI     },
  { l:"7π/6",  a:7*Math.PI/6 },
  { l:"5π/4",  a:5*Math.PI/4 },
  { l:"4π/3",  a:4*Math.PI/3 },
  { l:"3π/2",  a:3*Math.PI/2 },
  { l:"5π/3",  a:5*Math.PI/3 },
  { l:"7π/4",  a:7*Math.PI/4 },
  { l:"11π/6", a:11*Math.PI/6},
];

function ucSetAngle(theta) {
  ucTheta   = theta;
  ucSnapped = ucSnap(ucTheta, 0.02);
  ucUpdateInfo();
  plot.draw();
}

const UC_ANGLES_NEG = UC_ANGLES.slice(1).reverse().map(({ l, a }) => ({
  l: "-" + l, a: -a
}));

let ucCurrentTab = "pos";

function ucBuildGrid(tab) {
  const grid = document.getElementById("uc-angle-grid");
  grid.innerHTML = "";
  const angles = tab === "pos" ? UC_ANGLES : UC_ANGLES_NEG;
  angles.forEach(({ l, a }) => {
    const btn = document.createElement("button");
    btn.className = "uc-abtn";
    btn.textContent = l;
    btn.dataset.a = a;
    btn.addEventListener("click", () => ucSetAngle(+btn.dataset.a));
    grid.appendChild(btn);
  });
}

window.ucShowTab = function(tab) {
  ucCurrentTab = tab;
  document.getElementById("tab-pos").classList.toggle("active", tab === "pos");
  document.getElementById("tab-neg").classList.toggle("active", tab === "neg");
  ucBuildGrid(tab);
};

ucBuildGrid("pos");

// Botão ± — nega o ângulo atual
document.getElementById("uc-negate-btn").addEventListener("click", () => {
  ucSetAngle(-ucTheta);
  // Trocar aba automaticamente
  const goNeg = ucTheta < 0;
  if (goNeg !== (ucCurrentTab === "neg")) ucShowTab(goNeg ? "neg" : "pos");
});

// Input customizado — aceita graus (ex: 72°) ou radianos (ex: π/5 ou 0.5)
function parseAngle(raw) {
  raw = raw.trim();
  if (!raw) return null;

  // Graus: "-90°", "90°", "90 graus"
  const degMatch = raw.match(/^([+-]?\d+(?:[.,]\d+)?)\s*(?:°|graus?)?$/i);
  if (degMatch) return parseFloat(degMatch[1].replace(",", ".")) * Math.PI / 180;

  // Expressões com π/pi — corrige "2π" → "2*π" antes de substituir
  const expr = raw
    .replace(/pi/gi, "π")
    .replace(/(\d)π/g, "$1*" + Math.PI)   // "2π" → "2*3.14..."
    .replace(/π(\d)/g, Math.PI + "*$1")   // "π2" → "3.14...*2" (raro)
    .replace(/π/g, String(Math.PI));        // "π" sozinho
  try {
    const v = Function('"use strict"; return (' + expr + ')')();
    if (isFinite(v)) return v;
  } catch {}
  return null;
}

document.getElementById("uc-custom-btn").addEventListener("click", () => {
  const inp = document.getElementById("uc-custom-inp");
  const val = parseAngle(inp.value);
  if (val !== null) { inp.value = ""; ucSetAngle(val); }
  else inp.style.borderColor = "#f87171";
  setTimeout(() => inp.style.borderColor = "", 800);
});
document.getElementById("uc-custom-inp").addEventListener("keydown", e => {
  if (e.key === "Enter") document.getElementById("uc-custom-btn").click();
});

/* ──────────── FERRAMENTAS PEDAGÓGICAS ──────────── */
let toolColor = "#ffa500";
let toolMode  = null; // 'marker' | 'vline' | 'area' | 'triangle'
let areaOpacity = 0.25;

// Overlays persistentes
const overlays = []; // { type, x, x2, color, opacity, label }

// Cor ativa
document.querySelectorAll(".color-dot").forEach(dot => {
  dot.addEventListener("click", () => {
    document.querySelectorAll(".color-dot").forEach(d => d.classList.remove("active"));
    dot.classList.add("active");
    toolColor = dot.dataset.c;
  });
});

// Opacidade
const opSlider = document.getElementById("area-opacity");
const opVal    = document.getElementById("area-opacity-val");
opSlider.addEventListener("input", () => {
  areaOpacity = +opSlider.value / 100;
  opVal.textContent = opSlider.value + "%";
});

// Botões de ferramenta
function setTool(mode, btn) {
  toolMode = toolMode === mode ? null : mode;
  document.querySelectorAll(".tool-btn").forEach(b => b.classList.remove("active"));
  if (toolMode) btn.classList.add("active");
  canvas.style.cursor = toolMode ? "crosshair" : "";
}

document.getElementById("tool-marker").addEventListener("click", e => setTool("marker", e.currentTarget));
document.getElementById("tool-vline").addEventListener("click", e => setTool("vline", e.currentTarget));
document.getElementById("tool-area").addEventListener("click",  e => setTool("area",   e.currentTarget));
document.getElementById("tool-triangle").addEventListener("click", e => setTool("triangle", e.currentTarget));
document.getElementById("tool-clear").addEventListener("click", () => {
  overlays.length = 0;
  areaStart = null;
  plot.draw();
});

let areaStart = null;

canvas.addEventListener("click", e => {
  if (ucDragging) return;
  if (!toolMode) return;
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) / rect.width  * plot.W;
  const my = (e.clientY - rect.top)  / rect.height * plot.H;
  const x  = plot.invX(mx);
  const y  = plot.invY(my);

  if (toolMode === "marker") {
    overlays.push({ type: "marker", x, y, color: toolColor, label: formatExactValue(x) });
    plot.draw();
  } else if (toolMode === "vline") {
    overlays.push({ type: "vline", x, color: toolColor });
    plot.draw();
  } else if (toolMode === "area") {
    if (areaStart === null) {
      areaStart = x;
    } else {
      overlays.push({ type: "area", x: Math.min(areaStart, x), x2: Math.max(areaStart, x), color: toolColor, opacity: areaOpacity });
      areaStart = null;
      setTool(null, null);
      plot.draw();
    }
  } else if (toolMode === "triangle") {
    overlays.push({ type: "triangle", x, y, color: toolColor });
    setTool(null, null);
    plot.draw();
  }
});

/* Desenhar overlays dentro do plot.onDraw */
function drawOverlays() {
  const ctx = plot.ctx, dpr = window.devicePixelRatio || 1;
  ctx.save();
  ctx.scale(dpr, dpr);

  for (const ov of overlays) {
    if (ov.type === "marker") {
      const px = plot.X(ov.x), py = plot.Y(ov.y);
      // Ponto
      ctx.fillStyle = ov.color;
      ctx.beginPath(); ctx.arc(px, py, 7, 0, 2*Math.PI); ctx.fill();
      ctx.strokeStyle = "rgba(0,0,0,.5)"; ctx.lineWidth = 1.5; ctx.stroke();
      // Linhas tracejadas até os eixos
      ctx.strokeStyle = ov.color + "88"; ctx.lineWidth = 1.2; ctx.setLineDash([5,4]);
      ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(px, plot.Y(0)); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(plot.X(0), py); ctx.stroke();
      ctx.setLineDash([]);
      // Label
      ctx.fillStyle = ov.color; ctx.font = "bold 11px monospace";
      ctx.textAlign = "center"; ctx.textBaseline = "bottom";
      ctx.fillText(ov.label, px, py - 10);

    } else if (ov.type === "vline") {
      const px = plot.X(ov.x);
      ctx.strokeStyle = ov.color + "cc"; ctx.lineWidth = 2; ctx.setLineDash([6,4]);
      ctx.beginPath(); ctx.moveTo(px, 0); ctx.lineTo(px, plot.H); ctx.stroke();
      ctx.setLineDash([]);
      // Label
      ctx.fillStyle = ov.color; ctx.font = "bold 11px monospace";
      ctx.textAlign = "center"; ctx.textBaseline = "top";
      ctx.fillText(formatExactValue(ov.x), px, 6);

    } else if (ov.type === "area") {
      const px1 = plot.X(ov.x), px2 = plot.X(ov.x2);
      const py0 = plot.Y(0);
      ctx.fillStyle = ov.color + Math.round(ov.opacity * 255).toString(16).padStart(2,"0");
      // Sombrear área sob cada curva
      for (const cv of formulas) {
        const expr = cv.inp.value.trim(); if (!expr) continue;
        const cmp = compile(expr); if (!cmp || cmp.error) continue;
        ctx.beginPath(); ctx.moveTo(px1, py0);
        for (let X = ov.x; X <= ov.x2; X += (ov.x2 - ov.x) / 200) {
          try {
            const Y = cmp.fn(X);
            if (!isFinite(Y)) continue;
            ctx.lineTo(plot.X(X), plot.Y(Y));
          } catch {}
        }
        ctx.lineTo(px2, py0); ctx.closePath(); ctx.fill();
      }
      // Bordas
      ctx.strokeStyle = ov.color + "99"; ctx.lineWidth = 1.5; ctx.setLineDash([4,3]);
      ctx.beginPath(); ctx.moveTo(px1, 0); ctx.lineTo(px1, plot.H); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(px2, 0); ctx.lineTo(px2, plot.H); ctx.stroke();
      ctx.setLineDash([]);

    } else if (ov.type === "triangle") {
      const cx = plot.X(0), cy = plot.Y(0);
      const px = plot.X(ov.x), py = plot.Y(ov.y);
      // Cateto horizontal (cosseno) — azul
      ctx.strokeStyle = "#60a5fa"; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(px, cy); ctx.stroke();
      // Cateto vertical (seno) — verde
      ctx.strokeStyle = "#34d399"; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(px, cy); ctx.lineTo(px, py); ctx.stroke();
      // Hipotenusa — cor do usuário
      ctx.strokeStyle = ov.color; ctx.lineWidth = 2.5; ctx.setLineDash([6,3]);
      ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(px, py); ctx.stroke();
      ctx.setLineDash([]);
      // Labels
      ctx.font = "bold 11px monospace";
      ctx.fillStyle = "#60a5fa"; ctx.textAlign = "center"; ctx.textBaseline = "top";
      ctx.fillText("cos", (cx+px)/2, cy+5);
      ctx.fillStyle = "#34d399"; ctx.textAlign = "left"; ctx.textBaseline = "middle";
      ctx.fillText("sin", px+5, (cy+py)/2);
      ctx.fillStyle = ov.color; ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.fillText("r=1", (cx+px)/2 - 10*Math.sin(Math.atan2(cy-py, px-cx)),
                           (cy+py)/2 - 10*Math.cos(Math.atan2(cy-py, px-cx)));
    }
  }

  // Indicador de area em andamento
  if (areaStart !== null) {
    const px = plot.X(areaStart);
    ctx.strokeStyle = toolColor + "bb"; ctx.lineWidth = 2; ctx.setLineDash([4,3]);
    ctx.beginPath(); ctx.moveTo(px, 0); ctx.lineTo(px, plot.H); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = toolColor; ctx.font = "10px monospace";
    ctx.textAlign = "center"; ctx.fillText("→ clique p/ fechar área", px, 14);
  }

  ctx.restore();
}

    <input class="frow-inp" name="f${idx}" autocomplete="off" placeholder="y=..." value="${expr}" spellcheck="false">
    <button class="frow-del">×</button>`;
  const inp = row.querySelector("input");
  const dot = row.querySelector(".frow-dot");
  inp.addEventListener("input", updatePlot);
  row.querySelector("button").addEventListener("click", () => {
    row.remove(); formulas = formulas.filter(f => f.inp !== inp); updatePlot();
  });
  const formula = { inp, color, dot };
  dot.addEventListener("click", e => {
    e.stopPropagation();
    openPalette(dot, formula);
  });
  document.getElementById("formulas-rows").appendChild(row);
  formulas.push(formula);
  updatePlot();
}

function updatePlot() {
  const curves = formulas.map(({inp,color}) => {
    const expr = inp.value.trim(); if (!expr) return null;
    try { const c=compile(expr); return (c&&!c.error)?{fn:c.fn,color}:null; } catch { return null; }
  }).filter(Boolean);
  plot.setCurves(curves);
  document.getElementById("prof-labels").innerHTML = formulas
    .filter(f=>f.inp.value.trim())
    .map(f=>`<span class="prof-label" style="color:${f.color}">${f.inp.value.trim()}</span>`).join("");
}

function setView(v) {
  const def = piActive
    ? {xmin:-2*Math.PI,xmax:2*Math.PI,ymin:-3,ymax:3}
    : {xmin:-6,xmax:6,ymin:-4,ymax:4};
  plot.setView(v||def);
}

document.getElementById("btn-add").addEventListener("click", ()=>addFormula());

const btnPi = document.getElementById("btn-pi");
btnPi.addEventListener("click", ()=>{
  piActive=!piActive; btnPi.classList.toggle("active",piActive);
  plot.setPiAxis(piActive); setView(null);
});

const btnCircle = document.getElementById("btn-circle");
btnCircle.addEventListener("click", ()=>{
  circleActive=!circleActive; btnCircle.classList.toggle("active",circleActive);
  ucActive = circleActive;
  document.getElementById("uc-info").classList.toggle("show",circleActive);
  if (circleActive) { ucAutoZoom(); ucUpdateInfo(); }
  else plot.draw();
});

document.getElementById("btn-reset").addEventListener("click", ()=>{ setView(null); plot.draw(); });

/* Presets */
const presetsEl = document.getElementById("prof-presets");
const allPresets = PRESET_GROUPS.flatMap(g=>g.items.map(p=>({...p,group:g.title})));
presetsEl.innerHTML = PRESET_GROUPS.map(g=>`
  <div class="preset-group">
    <div class="preset-group-title">${g.title}</div>
    <div class="preset-btns">
      ${g.items.map(p=>`<button class="preset-btn" data-g="${g.title}" data-label="${p.label}">${p.label}</button>`).join("")}
    </div>
  </div>`).join("");

presetsEl.querySelectorAll(".preset-btn").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    presetsEl.querySelectorAll(".preset-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    const p = allPresets.find(x=>x.group===btn.dataset.g&&x.label===btn.dataset.label);
    if (!p) return;
    document.getElementById("formulas-rows").innerHTML=""; formulas=[];
    p.fns.forEach(f=>addFormula(f));
    piActive=p.pi; btnPi.classList.toggle("active",p.pi); plot.setPiAxis(p.pi);
    circleActive=p.uc; btnCircle.classList.toggle("active",p.uc);
    ucActive=p.uc;
    document.getElementById("uc-info").classList.toggle("show",p.uc);
    if (p.uc) { ucAutoZoom(); ucUpdateInfo(); }
    else setView(p.view||null);
  });
});

window.addEventListener("themechange", ()=>{ plot.draw(); });
addFormula("y=2^x"); addFormula("y=(1/2)^x");
</script>

<!-- Paleta de cores para fórmulas -->
<div class="color-palette hidden" id="color-palette">
</div>
</body>
</html>
