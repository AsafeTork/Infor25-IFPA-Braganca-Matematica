<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Professor · Informática 25</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles/tokens.css">
<link rel="stylesheet" href="styles/base.css">
<link rel="stylesheet" href="styles/board.css">
<link rel="icon" href="assets/logo.svg" type="image/svg+xml">
<style>
.al-top{position:sticky;top:0;z-index:50;height:52px;display:flex;align-items:center;gap:.6rem;padding:0 .85rem;background:color-mix(in srgb,var(--bg) 85%,transparent);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);}
.al-brand{font-family:var(--font-display);font-weight:800;font-size:1rem;color:var(--text);letter-spacing:-.02em;flex:1;text-decoration:none;}
.al-brand b{color:var(--accent);}
.al-topright{display:flex;align-items:center;gap:.4rem;}
.al-toplink{font-size:.8rem;color:var(--text-soft);padding:.25rem .5rem;border-radius:6px;text-decoration:none;}
</style>
</head>
<body>

<header class="al-top">
  <a class="al-brand" href="index.html">Informática <b>25</b></a>
  <div class="al-topright">
    <a href="aluno.html" class="al-toplink">Aluno</a>
    <button class="theme-toggle" id="theme-btn" aria-label="Tema"></button>
  </div>
</header>

<div class="board">
  <div class="bstage">
    <canvas id="plot-canvas" style="width:100%;height:100%;display:block;"></canvas>
    <div id="formulas-labels"></div>
  </div>
  <div class="bpanel">
    <div class="bsect">
      <span class="bsect-label">Fórmulas</span>
      <div id="formulas-rows"></div>
      <button class="btn ghost sm" id="btn-add-formula" style="width:100%;margin-top:.3rem">+ linha</button>
    </div>
    <div class="bsect brow">
      <label class="switch-label"><input type="checkbox" id="toggle-pi"> π</label>
      <button class="btn ghost sm" id="btn-reset">⌖</button>
      <label class="switch-label"><input type="checkbox" id="toggle-circle"> ⊙</label>
    </div>
    <div class="bsect" style="flex:1;overflow-y:auto">
      <span class="bsect-label">Exemplos</span>
      <div id="presets-grid"></div>
    </div>
    <div class="bsect">
      <div class="b-readout" id="readout">x = — · y = —</div>
    </div>
  </div>
</div>

<script type="module">
try {
  const { initTheme, mountThemeToggle } = await import("./core/theme.js");
  const { compile } = await import("./core/mathEngine.js");
  const { Plot, formatExactValue } = await import("./core/plotEngine.js");
  const { mountFloatingKeypad } = await import("./components/keypad.js");

  initTheme();
  
  const themeBt = document.getElementById("theme-btn");
  if (themeBt) mountThemeToggle(themeBt);
  
  mountFloatingKeypad();

  const PRESETS = [
    { label: "2ˣ vs ½ˣ", fns: ["y=2^x", "y=(1/2)^x"], pi: false, uc: false },
    { label: "2ˣ, 3ˣ, 10ˣ", fns: ["y=2^x", "y=3^x", "y=10^x"], pi: false, uc: false },
    { label: "PA r=5", fns: ["y=3+(x-1)*5"], pi: false, uc: false },
    { label: "PG q=2", fns: ["y=2*2^(x-1)"], pi: false, uc: false },
    { label: "sin(x)", fns: ["y=sin(x)"], pi: true, uc: true },
    { label: "cos(x)", fns: ["y=cos(x)"], pi: true, uc: true },
    { label: "tan(x)", fns: ["y=tan(x)"], pi: true, uc: true },
    { label: "sin + cos", fns: ["y=sin(x)", "y=cos(x)"], pi: true, uc: true },
    { label: "Círculo", fns: [], pi: false, uc: true },
  ];

  const canvas = document.getElementById("plot-canvas");
  if (!canvas) throw new Error("Canvas não encontrado");
  
  const plot = new Plot(canvas, { xmin: -6, xmax: 6, ymin: -4, ymax: 4 });
  plot.onProbe = (x, y) => {
    const readout = document.getElementById("readout");
    if (readout) readout.textContent = `x = ${formatExactValue(x)}   y = ${formatExactValue(y)}`;
  };

  let formulas = [];

  function addFormula(expr = "") {
    const row = document.createElement("div");
    row.className = "frow";
    row.innerHTML = `<span class="frow-dot"></span><input class="frow-inp mono" placeholder="y=..." value="${expr}"><button class="frow-del">×</button>`;
    const inp = row.querySelector("input");
    if (inp) inp.addEventListener("input", updatePlot);
    const delBtn = row.querySelector("button");
    if (delBtn) delBtn.addEventListener("click", () => {
      row.remove();
      formulas = formulas.filter(f => f.input !== inp);
      updatePlot();
    });
    const container = document.getElementById("formulas-rows");
    if (container) container.appendChild(row);
    formulas.push({ input: inp });
    updatePlot();
  }

  function updatePlot() {
    const curves = [];
    for (const { input } of formulas) {
      if (!input) continue;
      const expr = input.value.trim();
      if (!expr) continue;
      try {
        const c = compile(expr);
        if (c && !c.error) curves.push({ fn: c.fn, color: "var(--accent)" });
      } catch (e) {
        console.error(`Erro: ${expr}`, e);
      }
    }
    plot.setCurves(curves);
  }

  const addBtn = document.getElementById("btn-add-formula");
  if (addBtn) addBtn.addEventListener("click", () => addFormula());

  const piToggle = document.getElementById("toggle-pi");
  if (piToggle) {
    piToggle.addEventListener("change", (e) => {
      plot.setPiAxis(e.target.checked);
      plot.setView(e.target.checked ? {xmin:-2*Math.PI,xmax:2*Math.PI,ymin:-3,ymax:3} : {xmin:-6,xmax:6,ymin:-4,ymax:4});
      plot.draw();
    });
  }

  const resetBtn = document.getElementById("btn-reset");
  if (resetBtn) {
    resetBtn.addEventListener("click", () => {
      const pi = piToggle && piToggle.checked;
      plot.setView(pi ? {xmin:-2*Math.PI,xmax:2*Math.PI,ymin:-3,ymax:3} : {xmin:-6,xmax:6,ymin:-4,ymax:4});
      plot.draw();
    });
  }

  const circleToggle = document.getElementById("toggle-circle");
  if (circleToggle) {
    circleToggle.addEventListener("change", (e) => {
      plot.showUnitCircle = e.target.checked;
      plot.draw();
    });
  }

  const presetGrid = document.getElementById("presets-grid");
  if (presetGrid) {
    presetGrid.innerHTML = PRESETS.map((p, i) => `<button class="preset-btn" data-idx="${i}">${p.label}</button>`).join("");
    presetGrid.querySelectorAll(".preset-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        const p = PRESETS[+btn.dataset.idx];
        const frows = document.getElementById("formulas-rows");
        if (frows) frows.innerHTML = "";
        formulas = [];
        p.fns.forEach(f => addFormula(f));
        if (piToggle) piToggle.checked = p.pi;
        plot.setPiAxis(p.pi);
        if (circleToggle) circleToggle.checked = p.uc;
        plot.showUnitCircle = p.uc;
        plot.setView(p.pi ? {xmin:-2*Math.PI,xmax:2*Math.PI,ymin:-3,ymax:3} : {xmin:-6,xmax:6,ymin:-4,ymax:4});
        plot.draw();
      });
    });
  }

  addFormula("y=2^x");
  addFormula("y=(1/2)^x");

} catch (err) {
  console.error("🔴 ERRO CRÍTICO:", err.message, err.stack);
}
</script>
</body>
</html>
