<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Informática 25 · Matemática</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles/tokens.css">
<link rel="stylesheet" href="styles/base.css">
<link rel="icon" href="assets/logo.svg" type="image/svg+xml">
<style>
/* ── Landing — minimal ── */
body { margin: 0; min-height: 100vh; display: flex; flex-direction: column; }

.land {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 2rem 1.5rem;
  background: radial-gradient(ellipse 80% 60% at 50% 40%, color-mix(in srgb,var(--accent) 8%,transparent), transparent);
  min-height: calc(100vh - 60px);
  text-align: center;
}

.land-logo {
  width: clamp(56px,12vw,80px); height: clamp(56px,12vw,80px);
  object-fit: contain; margin-bottom: 1.25rem;
}

.land-title {
  font-family: var(--font-display); font-weight: 800;
  font-size: clamp(2.4rem, 10vw, 5rem);
  letter-spacing: -.03em; line-height: 1;
  margin: 0 0 .25rem;
  color: var(--text);
}
.land-title b { color: var(--accent); }

.land-sub {
  font-family: var(--font-mono); font-size: clamp(.85rem,2vw,1.1rem);
  color: var(--text-mut); letter-spacing: .18em; text-transform: uppercase;
  margin-bottom: 2.25rem;
}

.land-cards {
  display: grid; grid-template-columns: 1fr 1fr; gap: .75rem;
  width: min(400px, 100%);
}
@media (max-width: 420px) { .land-cards { grid-template-columns: 1fr; } }

.land-card {
  display: flex; flex-direction: column; align-items: center; gap: .5rem;
  padding: 1.25rem 1rem; border-radius: var(--radius);
  border: 1.5px solid var(--border); background: var(--surface);
  text-decoration: none; color: var(--text);
  transition: border-color .2s, background .2s, transform .18s;
}
.land-card:hover { border-color: var(--accent); background: var(--accent-soft); transform: translateY(-2px); }
.land-card svg { width: 28px; height: 28px; color: var(--accent); }
.land-card h3 { font-size: 1rem; margin: 0; font-family: var(--font-display); }
.land-card span { font-size: .78rem; color: var(--text-mut); }

.land-foot {
  padding: 1.25rem; text-align: center;
  font-size: .75rem; color: var(--text-mut);
  border-top: 1px solid var(--border);
}
.land-foot b { color: var(--accent); }
</style>
</head>
<body>

<header class="topbar">
  <span class="brand"><img class="mark" src="assets/logo.svg" alt=""> Informática <b>25</b></span>
  <nav>
    <button class="theme-toggle keep" id="tg" aria-label="Tema"></button>
  </nav>
</header>

<div class="land">
  <img class="land-logo" id="logo" src="assets/logo.svg" alt="Logo">
  <h1 class="land-title">Informática <b>25</b></h1>
  <div class="land-sub">matemática</div>

  <div class="land-cards">
    <a class="land-card" href="aluno.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 10 12 5 2 10l10 5 10-5z"/>
        <path d="M6 12v5c0 1 2.7 3 6 3s6-2 6-3v-5"/>
      </svg>
      <h3>Aluno</h3>
      <span>Estudar e praticar</span>
    </a>
    <a class="land-card" href="professor.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="14" rx="2"/>
        <path d="M8 21h8M12 17v4"/>
      </svg>
      <h3>Professor</h3>
      <span>Quadro de fórmulas</span>
    </a>
  </div>
</div>

<footer class="land-foot">
  IFPA — Campus Bragança · by <b>Asafe Tork</b> &amp; <b>Caludio</b> (IA)
</footer>

<script type="module">
import { initTheme, mountThemeToggle } from "./core/theme.js";
initTheme();
mountThemeToggle(document.getElementById("tg"));
</script>
</body>
</html>
